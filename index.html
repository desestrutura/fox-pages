<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fox-pages</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f11;
    --surface: #161a1f;
    --surface-hover: #1c2127;
    --border: #242a32;
    --text: #e8e6e3;
    --text-muted: #8b9098;
    --accent: #7eb8da;
    --accent-dim: #4a7a96;
    --green: #6bcf7f;
    --yellow: #e5c07b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 72px 24px 96px;
  }

  header {
    margin-bottom: 56px;
    text-align: center;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 2.2rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  header p {
    color: var(--text-muted);
    font-size: 0.88rem;
  }

  .section-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .pages-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 56px;
  }

  .page-link {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.15s;
  }

  .page-link:hover {
    border-color: #3a424d;
    background: var(--surface-hover);
  }

  .page-icon {
    font-size: 1.5rem;
    width: 40px;
    text-align: center;
    flex-shrink: 0;
  }

  .page-info { flex: 1; min-width: 0; }

  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 2px;
  }

  .page-desc {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .page-arrow {
    color: var(--accent-dim);
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.75rem;
  }

  footer a {
    color: var(--accent-dim);
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <h1>fox-pages</h1>
    <p>Páginas HTML estáticas · <a href="https://github.com/desestrutura/fox-pages" target="_blank" style="color: var(--accent-dim); text-decoration: none;">github.com/desestrutura/fox-pages</a></p>
  </header>

  <div class="section-label">Páginas</div>

  <div class="pages-list">

    <a class="page-link" href="roadmap-games-2026.html">
      <span class="page-icon">🎮</span>
      <div class="page-info">
        <div class="page-title">Roadmap 2026 — Games</div>
        <div class="page-desc">Ordem de jogos solo + co-op para 2026</div>
      </div>
      <span class="page-arrow">→</span>
    </a>

    <a class="page-link" href="roadmap-teddy-2026.html">
      <span class="page-icon">🦑</span>
      <div class="page-info">
        <div class="page-title">Roadmap 2026 — Teddy</div>
        <div class="page-desc">Roadmap da Teteddy!</div>
      </div>
      <span class="page-arrow">→</span>
    </a>

  </div>

  <footer>
    <p><a href="https://github.com/desestrutura/fox-pages" target="_blank">Ver repositório no GitHub</a></p>
  </footer>

</div>

</body>
</html>
